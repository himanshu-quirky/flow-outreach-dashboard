<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prozoship MIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-mark">P</div>
        <span class="logo-text">Prozoship</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-view="delivery" href="#">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3l4 4-4 4M8 3L4 7l4 4"/></svg>
        <span>Delivery Report</span>
      </a>
      <a class="nav-item" data-view="pickup" href="#">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
        <span>Pickup Report</span>
      </a>
      <a class="nav-item" data-view="cancellations" href="#">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>
        <span>Cancellations &amp; Returns</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a class="nav-item" data-view="settings" href="#">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Settings</span>
      </a>
      <div id="sidebar-last-updated" class="sidebar-updated"></div>
    </div>
  </aside>

  <!-- Main wrap -->
  <div id="main-wrap">
    <!-- Top bar -->
    <header id="topbar">
      <div class="topbar-left">
        <span class="topbar-title">MIS Report &amp; Analysis</span>
      </div>
      <div class="topbar-right">
        <button id="upload-trigger-btn" class="btn btn-sm btn-outline">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Reports
        </button>
<button id="notif-btn" class="icon-btn" title="Notifications">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span id="notif-badge" class="notif-badge hidden">0</span>
        </button>
        <div id="wa-pill" class="wa-pill disconnected">
          <span class="wa-dot"></span>
          <span id="wa-pill-text">WhatsApp</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main id="content">
      <!-- Rendered by app.js -->
    </main>
  </div>

  <!-- Notification panel -->
  <div id="notif-overlay" class="overlay hidden"></div>
  <aside id="notif-panel" class="notif-panel hidden">
    <div class="notif-panel-header">
      <span class="notif-panel-title">Notifications</span>
      <button id="mark-all-read-btn" class="btn-text">Mark all read</button>
      <button id="notif-close-btn" class="icon-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="notif-list"></div>
  </aside>

  <!-- Upload modal -->
  <div id="upload-overlay" class="overlay hidden"></div>
  <div id="upload-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Upload Prozo Reports</span>
        <button class="icon-btn modal-close-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="upload-drop-zone" class="upload-drop-zone">
        <div class="upload-icon">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p class="upload-label">Drop your Prozo HTML report files here</p>
        <p class="upload-hint">MIS Dashboard · Total Pending Summary · Raise with Proship</p>
        <input type="file" id="file-input" multiple accept=".html" style="display:none">
        <button class="btn btn-accent" id="choose-files-btn">Choose files</button>
      </div>
      <div id="upload-results" class="upload-results"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
